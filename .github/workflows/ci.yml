# CI — the safety net under our "tsc + build before commit" discipline (org pass, July 2026).
# Runs on every push/PR to main: typecheck + production build. No secrets, no DB — the app is
# built to boot without any env var (optional-infra rule), so the build is fully offline-safe.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
